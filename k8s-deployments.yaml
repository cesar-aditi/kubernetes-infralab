# kubectl apply -f k8s-deployments.yaml
# (02-deploy-after.sh does this automatically)

# -------------------------------------------------------
# Namespace + guardrails
# FIX: was missing — no limits on what could be deployed
# -------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: production-quota
  namespace: production
spec:
  hard:
    requests.cpu: "20"
    requests.memory: "40Gi"
    limits.cpu: "40"
    limits.memory: "80Gi"
    services.loadbalancers: "1"   # FIX: cap at 1 LB (the ingress)
---
apiVersion: v1
kind: LimitRange
metadata:
  name: production-limits
  namespace: production
spec:
  limits:
  - type: Container
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    default:
      cpu: "500m"
      memory: "512Mi"
---
# -------------------------------------------------------
# frontend
# FIX: replicas 10→2 (HPA handles scaling)
# FIX: requests 2Gi/1000m → 300Mi/150m
# FIX: probes added, spot toleration added, no hardcoded secrets
# -------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: production
spec:
  replicas: 2   # FIX: HPA scales from here
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: Equal
        value: "true"
        effect: NoSchedule
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: frontend
      containers:
      - name: frontend
        image: nginx:1.21
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "300Mi"   # FIX: was 2Gi
            cpu: "150m"       # FIX: was 1000m
          limits:
            memory: "512Mi"
            cpu: "500m"
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets   # FIX: no hardcoded secrets
              key: db-password
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: production
spec:
  type: ClusterIP   # FIX: was LoadBalancer ($18/mo) — ingress handles this
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
---
# -------------------------------------------------------
# backend-api
# FIX: replicas 8→2, requests 4Gi/2000m → 800Mi/400m
# -------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: Equal
        value: "true"
        effect: NoSchedule
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: backend-api
      containers:
      - name: backend-api
        image: nginx:1.21
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "800Mi"   # FIX: was 4Gi
            cpu: "400m"       # FIX: was 2000m
          limits:
            memory: "1536Mi"
            cpu: "1000m"
        env:
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: db-password
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api-service
  namespace: production
spec:
  type: ClusterIP   # FIX: was LoadBalancer
  selector:
    app: backend-api
  ports:
  - port: 8080
    targetPort: 8080
---
# -------------------------------------------------------
# batch-worker — CronJob instead of always-on Deployment
# FIX: was 4 replicas × 24/7 idle; now runs only at 02:00
# -------------------------------------------------------
apiVersion: batch/v1
kind: CronJob
metadata:
  name: batch-worker
  namespace: production
spec:
  schedule: "0 2 * * *"
  timeZone: "America/Sao_Paulo"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 7200
      template:
        spec:
          restartPolicy: OnFailure
          tolerations:
          - key: "cloud.google.com/gke-spot"
            operator: Equal
            value: "true"
            effect: NoSchedule
          containers:
          - name: batch-worker
            image: busybox:1.35
            command: ["sh", "-c", "echo 'batch job done'; sleep 5"]
            resources:
              requests:
                memory: "2Gi"
                cpu: "1000m"
              limits:
                memory: "4Gi"
                cpu: "2000m"
---
# -------------------------------------------------------
# HPA — fixed: minReplicas allows actual scale-down
# FIX: autoscaling/v2 with CPU+memory, scale-down policy
# -------------------------------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 2    # FIX: was 10 — now actually scales down at night
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-api-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-api
  minReplicas: 2    # FIX: was 8
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 65
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
---
# -------------------------------------------------------
# Ingress — one entry point replaces 3 LoadBalancers
# FIX: was 3 × LoadBalancer = $54/mo → 1 ingress = $18/mo
# (NGINX controller installed by 02-deploy-after.sh via helm)
# -------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prod-ingress
  namespace: production
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
  - host: app.example.com   # update to your domain
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-api-service
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
