# kubectl apply -f k8s-deployments.yaml
# (02-deploy-after.sh does this automatically)

# -------------------------------------------------------
# Namespace + guardrails
# FIX: was missing — no limits on what could be deployed
# -------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: production
  labels:
    cost-center: "production"          # FIX: cost center label for chargeback
    environment: "production"
    # FIX: PodSecurity admission — enforce restricted standard in production.
    # Blocks privileged containers, host namespaces, and unsafe capabilities.
    # "warn" and "audit" also set so violations surface in logs even if not yet
    # blocking (e.g. during a rollout).
    pod-security.kubernetes.io/enforce: "restricted"
    pod-security.kubernetes.io/enforce-version: "latest"
    pod-security.kubernetes.io/warn: "restricted"
    pod-security.kubernetes.io/warn-version: "latest"
    pod-security.kubernetes.io/audit: "restricted"
    pod-security.kubernetes.io/audit-version: "latest"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: production-quota
  namespace: production
spec:
  hard:
    requests.cpu: "20"
    requests.memory: "40Gi"
    limits.cpu: "40"
    limits.memory: "80Gi"
    services.loadbalancers: "1"   # FIX: cap at 1 LB (the ingress)
---
apiVersion: v1
kind: LimitRange
metadata:
  name: production-limits
  namespace: production
spec:
  limits:
  - type: Container
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    default:
      cpu: "500m"
      memory: "512Mi"
---
# -------------------------------------------------------
# ServiceAccounts — one per workload (RBAC best practice)
# FIX: was missing — all workloads defaulted to `default` SA
# automountServiceAccountToken: false — none of these workloads
# call the Kubernetes API, so mounting a token is unnecessary.
# -------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: production
  annotations:
    iam.gke.io/gcp-service-account: REPLACE_WITH_PROJECT_ID-frontend@REPLACE_WITH_PROJECT_ID.iam.gserviceaccount.com
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-api-sa
  namespace: production
  annotations:
    iam.gke.io/gcp-service-account: REPLACE_WITH_PROJECT_ID-backend-api@REPLACE_WITH_PROJECT_ID.iam.gserviceaccount.com
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: batch-worker-sa
  namespace: production
  annotations:
    iam.gke.io/gcp-service-account: REPLACE_WITH_PROJECT_ID-batch-worker@REPLACE_WITH_PROJECT_ID.iam.gserviceaccount.com
automountServiceAccountToken: false
---
# -------------------------------------------------------
# NetworkPolicy — default deny all ingress and egress
# FIX: was missing — pods had unrestricted inter-pod communication
# -------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: production
spec:
  podSelector: {}   # applies to all pods in namespace
  policyTypes:
  - Ingress
  - Egress
---
# Allow frontend to receive traffic from the ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 80
---
# Allow backend-api to receive traffic from frontend and ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-backend-api
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: backend-api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080
---
# FIX: NetworkLogging — enables Dataplane V2 network policy enforcement logging
# Required by rule: "Network policy logging must be enabled for enforcement verification"
apiVersion: networking.gke.io/v1alpha1
kind: NetworkLogging
metadata:
  name: default
spec:
  cluster:
    allow:
      log: false     # only log denied traffic to avoid log volume on allowed flows
    deny:
      log: true
---
# Allow all pods to reach kube-dns for name resolution (required with default-deny egress)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: production
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
# Allow frontend egress to backend-api
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend-egress
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: backend-api
    ports:
    - protocol: TCP
      port: 8080
---
# Allow batch-worker outbound internet access (image pulls, external API calls)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-batch-worker-egress
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: batch-worker
  policyTypes:
  - Egress
  egress:
  - {}   # batch-worker may need unrestricted egress; tighten when destinations are known
---
# -------------------------------------------------------
# frontend
# FIX: replicas 10→2 (HPA handles scaling)
# FIX: requests 2Gi/1000m → 300Mi/150m
# FIX: probes added, spot toleration added, no hardcoded secrets
# -------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: production
spec:
  replicas: 2   # FIX: HPA scales from here
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: frontend-sa           # FIX: dedicated SA (not default)
      automountServiceAccountToken: false        # FIX: no K8s API access needed
      tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: Equal
        value: "true"
        effect: NoSchedule
      # FIX: podAntiAffinity — hard rule prevents all frontend pods landing in the same zone
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: frontend
            topologyKey: topology.kubernetes.io/zone
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: frontend
      containers:
      - name: frontend
        image: nginx:1.21
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "300Mi"   # FIX: was 2Gi
            cpu: "150m"       # FIX: was 1000m
          limits:
            memory: "512Mi"
            cpu: "500m"
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets   # FIX: no hardcoded secrets
              key: db-password
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: production
spec:
  type: ClusterIP   # FIX: was LoadBalancer ($18/mo) — ingress handles this
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
  sessionAffinity: None           # FIX: explicit — None avoids sticky-session imbalance
  # externalTrafficPolicy not set: ClusterIP Services do not handle external traffic
---
# -------------------------------------------------------
# backend-api
# FIX: replicas 8→2, requests 4Gi/2000m → 800Mi/400m
# -------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      serviceAccountName: backend-api-sa        # FIX: dedicated SA
      automountServiceAccountToken: false        # FIX: no K8s API access needed
      tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: Equal
        value: "true"
        effect: NoSchedule
      # FIX: podAntiAffinity — hard rule prevents all backend-api pods landing in the same zone
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: backend-api
            topologyKey: topology.kubernetes.io/zone
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: backend-api
      containers:
      - name: backend-api
        image: nginx:1.21
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "800Mi"   # FIX: was 4Gi
            cpu: "400m"       # FIX: was 2000m
          limits:
            memory: "1536Mi"
            cpu: "1000m"
        env:
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: db-password
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api-service
  namespace: production
spec:
  type: ClusterIP   # FIX: was LoadBalancer
  selector:
    app: backend-api
  ports:
  - port: 8080
    targetPort: 8080
  sessionAffinity: None           # FIX: explicit — even distribution, no sticky sessions
  # externalTrafficPolicy not set: ClusterIP Services do not handle external traffic
---
# -------------------------------------------------------
# batch-worker — CronJob instead of always-on Deployment
# FIX: was 4 replicas × 24/7 idle; now runs only at 02:00
# -------------------------------------------------------
apiVersion: batch/v1
kind: CronJob
metadata:
  name: batch-worker
  namespace: production
spec:
  schedule: "0 2 * * *"
  timeZone: "America/Sao_Paulo"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 7200
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: batch-worker-sa   # FIX: dedicated SA
          automountServiceAccountToken: false    # FIX: no K8s API access needed
          tolerations:
          - key: "cloud.google.com/gke-spot"
            operator: Equal
            value: "true"
            effect: NoSchedule
          containers:
          - name: batch-worker
            image: busybox:1.35
            command: ["sh", "-c", "echo 'batch job done'; sleep 5"]
            resources:
              requests:
                memory: "2Gi"
                cpu: "1000m"
              limits:
                memory: "4Gi"
                cpu: "2000m"
---
# -------------------------------------------------------
# HPA — fixed: minReplicas allows actual scale-down
# FIX: autoscaling/v2 with CPU+memory, scale-down policy
# -------------------------------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 2    # FIX: was 10 — now actually scales down at night
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-api-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-api
  minReplicas: 2    # FIX: was 8
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 65
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
---
# -------------------------------------------------------
# Ingress — one entry point replaces 3 LoadBalancers
# FIX: was 3 × LoadBalancer = $54/mo → 1 ingress = $18/mo
# (NGINX controller installed by 02-deploy-after.sh via helm)
# -------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prod-ingress
  namespace: production
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
  - host: app.example.com   # update to your domain
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-api-service
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
