# =======================================================
# namespace.yaml
# Single namespace for everything — no resource quotas
# =======================================================
apiVersion: v1
kind: Namespace
metadata:
  name: default
  # No LimitRange — pods can request unlimited resources
  # No ResourceQuota — teams can deploy anything
---
# =======================================================
# hpa.yaml — Horizontal Pod Autoscaler
# Added late, misconfigured — doesn't actually help
# =======================================================
apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 10    # Min = current count — HPA can never scale DOWN
  maxReplicas: 20    # Can only scale up, wasting money at off-peak
  targetCPUUtilizationPercentage: 80
---
apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-api
  minReplicas: 8     # Same problem — min is set too high
  maxReplicas: 15
  targetCPUUtilizationPercentage: 70
---
# =======================================================
# network-policy.yaml — No network policies defined
# All pods can talk to all pods — over-permissive
# Also means no traffic shaping or cost-optimized routing
# =======================================================

# NOTE: No NetworkPolicy resources exist in this cluster.
# All pod-to-pod traffic is unrestricted.
# Cross-zone traffic is NOT minimized — pods communicate
# across zones freely, incurring inter-zone egress charges
# (~$0.01/GB). With 8 backend replicas spread across zones,
# estimated cross-zone traffic cost: ~$200/month.
