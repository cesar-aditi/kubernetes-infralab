# =======================================================
# frontend-deployment.yaml
# Last updated: 2021-03-15 — "just make it work"
# =======================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
  labels:
    app: frontend
spec:
  replicas: 10        # Hardcoded — was set during a traffic spike, never reduced
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: gcr.io/my-company-prod-001/frontend:v2.1.0
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "2Gi"    # Over-requested — app actually uses ~200MB
            cpu: "1000m"     # Over-requested — app actually uses ~100m
          limits:
            memory: "4Gi"    # No real limit tuning done
            cpu: "2000m"
        env:
        - name: NODE_ENV
          value: "production"
        - name: DB_PASSWORD    # Secret hardcoded in env — not using Secret Manager
          value: "Sup3rS3cur3Pass2021!"
        # No liveness or readiness probes — k8s can't detect unhealthy pods
        # No lifecycle hooks
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: LoadBalancer    # Creates a Cloud Load Balancer for EVERY service — expensive
  selector:
    app: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
---
# =======================================================
# backend-api-deployment.yaml
# =======================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: default
spec:
  replicas: 8         # Same story — set during peak, never scaled down
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
      - name: backend-api
        image: gcr.io/my-company-prod-001/backend-api:v3.4.2
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "4Gi"    # Java app — someone set this high "just in case"
            cpu: "2000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "production"
        - name: DATABASE_URL
          value: "jdbc:postgresql://10.0.0.5:5432/appdb"
        - name: DATABASE_PASSWORD
          value: "AnotherP@ssw0rd123"   # Hardcoded secret again
        # No resource quotas at namespace level
        # No pod disruption budget
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api-service
spec:
  type: LoadBalancer    # Another individual LB — $18/month each just idle
  selector:
    app: backend-api
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
---
# =======================================================
# batch-worker-deployment.yaml  
# Runs nightly batch jobs — but deployed as always-on
# =======================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch-worker
  namespace: default
spec:
  replicas: 4         # Always on — even though jobs only run 2h/night
  selector:
    matchLabels:
      app: batch-worker
  template:
    metadata:
      labels:
        app: batch-worker
    spec:
      containers:
      - name: batch-worker
        image: gcr.io/my-company-prod-001/batch-worker:v1.0.8
        resources:
          requests:
            memory: "8Gi"    # Massive request — based on max possible usage
            cpu: "4000m"
          limits:
            memory: "16Gi"
            cpu: "8000m"
        # Should be a CronJob — not a Deployment
        # Currently idle 22 hours/day consuming full resource requests
---
# =======================================================
# monitoring-stack — self-hosted when Cloud Monitoring exists
# =======================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 2         # HA prometheus — duplicates GCP's built-in monitoring
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.30.0
        resources:
          requests:
            memory: "4Gi"
            cpu: "1000m"
          limits:
            memory: "8Gi"
            cpu: "2000m"
        volumeMounts:
        - name: prometheus-data
          mountPath: /prometheus
      volumes:
      - name: prometheus-data
        emptyDir: {}    # Data lost on restart — no persistent volume, yet still paying for the pods
